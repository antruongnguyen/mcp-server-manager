<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MCPSM — MCP Server Manager</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='32' height='32' viewBox='0 0 180 180' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='90' cy='90' r='22' stroke='%23548af7' stroke-width='5'/%3E%3Ccircle cx='90' cy='90' r='14' fill='%23548af7' opacity='0.3'/%3E%3Cpath d='M90 68L93 75H87Z' fill='%23548af7'/%3E%3Cpath d='M90 112L87 105H93Z' fill='%23548af7'/%3E%3Cpath d='M68 90L75 87V93Z' fill='%23548af7'/%3E%3Cpath d='M112 90L105 93V87Z' fill='%23548af7'/%3E%3Cline x1='77' y1='78' x2='52' y2='52' stroke='%236aab73' stroke-width='4' stroke-linecap='round'/%3E%3Crect x='28' y='28' width='28' height='28' rx='6' stroke='%236aab73' stroke-width='4'/%3E%3Cline x1='103' y1='78' x2='128' y2='52' stroke='%2356a8f5' stroke-width='4' stroke-linecap='round'/%3E%3Crect x='124' y='28' width='28' height='28' rx='6' stroke='%2356a8f5' stroke-width='4'/%3E%3Cline x1='77' y1='102' x2='52' y2='128' stroke='%23f2c55c' stroke-width='4' stroke-linecap='round'/%3E%3Crect x='28' y='124' width='28' height='28' rx='6' stroke='%23f2c55c' stroke-width='4'/%3E%3Cline x1='103' y1='102' x2='128' y2='128' stroke='%23fa6675' stroke-width='4' stroke-linecap='round'/%3E%3Crect x='124' y='124' width='28' height='28' rx='6' stroke='%23fa6675' stroke-width='4'/%3E%3C/svg%3E">
<style>
  :root {
    --radius: 8px;
  }
  /* Dark theme (default) — based on Islands Dark */
  [data-theme="dark"] {
    --bg: #111214;
    --surface: #1b1c1f;
    --surface2: #252629;
    --border: #393b40;
    --text: #e8e9ed;
    --text2: #a1a4ab;
    --accent: #548af7;
    --accent-hover: #70aeff;
    --green: #5ec26a;
    --yellow: #f5d26a;
    --red: #fa6675;
    --blue: #56a8f5;
    --green-bg: #1e2e22;
    --yellow-bg: #2e2a1c;
    --red-bg: #2e1c1e;
    --blue-bg: #1c2535;
    --modal-overlay: rgba(0,0,0,0.7);
    --logo-accent: #7ea8ff;
    --logo-green: #72d67e;
    --logo-blue: #72bbff;
    --logo-yellow: #ffd970;
    --logo-red: #ff8090;
  }
  /* Light theme — based on Islands Light */
  [data-theme="light"] {
    --bg: #edeef2;
    --surface: #ffffff;
    --surface2: #e8e9ee;
    --border: #d0d2d8;
    --text: #080808;
    --text2: #4a4d5a;
    --accent: #0033b3;
    --accent-hover: #002d9e;
    --green: #18a030;
    --yellow: #b08a10;
    --red: #e00000;
    --blue: #0066cc;
    --green-bg: #ddf2e2;
    --yellow-bg: #fdf3cd;
    --red-bg: #fde0e0;
    --blue-bg: #d8e8f8;
    --modal-overlay: rgba(0,0,0,0.35);
    --logo-accent: #3060cc;
    --logo-green: #20964a;
    --logo-blue: #2878d0;
    --logo-yellow: #c09820;
    --logo-red: #d03040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
  }
  #app { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); color: var(--text); cursor: pointer;
    font-size: 13px; transition: background 0.15s;
  }
  .btn:hover { background: var(--border); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }

  /* Icon system */
  .icon { width: 14px; height: 14px; display: inline-block; vertical-align: middle; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); cursor: pointer; transition: all 0.15s; padding: 0;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn.danger { border-color: var(--red); color: var(--red); }
  .icon-btn.danger:hover { background: var(--red); color: #fff; }
  .icon-btn.accent { border-color: var(--accent); color: var(--accent); }
  .icon-btn.accent:hover { background: var(--accent); color: #fff; }
  .labeled-btn {
    display: inline-flex; align-items: center; gap: 5px;
    height: 28px; padding: 0 10px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); cursor: pointer; transition: all 0.15s;
    font-size: 11px; font-weight: 500; font-family: inherit; white-space: nowrap;
  }
  .labeled-btn .icon { width: 12px; height: 12px; }
  .labeled-btn:hover { background: var(--border); color: var(--text); }
  .labeled-btn.accent { border-color: var(--accent); color: var(--accent); }
  .labeled-btn.accent:hover { background: var(--accent); color: #fff; }
  .labeled-btn.warn { border-color:var(--yellow); color:var(--yellow); }
  .labeled-btn.warn:hover { background: var(--yellow); color: #fff; }
  .labeled-btn.danger { border-color: var(--red); color: var(--red); }
  .labeled-btn.danger:hover { background: var(--red); color: #fff; }
  .labeled-btn.setup { border-color: var(--green); color: var(--green); }
  .labeled-btn.setup:hover { background: var(--green); color: #fff; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 300px; min-width: 220px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 12px 16px; font-size: 12px; font-weight: 600;
    color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .server-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .server-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer; transition: background 0.1s, opacity 0.15s;
    border-left: 3px solid transparent;
  }
  .server-item:hover { background: var(--surface2); }
  .server-item.active { background: var(--surface2); border-left-color: var(--accent); }
  .server-item.disabled { opacity: 0.5; }
  .sidebar-sep {
    height: 1px; background: var(--border); margin: 4px 16px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .status-dot.stopped { background: var(--text2); }
  .status-dot.starting, .status-dot.stopping, .status-dot.initializing { background: var(--yellow); }
  .status-dot.running { background: var(--green); }
  .status-dot.ready { background: var(--green); }
  .status-dot.error { background: var(--red); }
  .server-name { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .server-tools-count {
    font-size: 10px; color: var(--text2); background: var(--surface2);
    padding: 1px 6px; border-radius: 8px; flex-shrink: 0;
  }

  /* Content area */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .content-header h2 { font-size: 14px; font-weight: 600; }
  .content-header .status-badge {
    font-size: 12px; padding: 2px 6px; border-radius: 12px;
    font-weight: 500;
  }
  .status-badge.stopped { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .status-badge.starting, .status-badge.stopping, .status-badge.initializing { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow); }
  .status-badge.running { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .status-badge.ready { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .status-badge.error { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
  .server-actions { display: flex; gap: 8px; align-items: center; }

  /* Enable toggle switch */
  .toggle-switch {
    position: relative; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-slider {
    position: relative; display: inline-block; width: 36px; height: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; transition: 0.2s; flex-shrink: 0;
  }
  .toggle-slider:before {
    content: ''; position: absolute; height: 14px; width: 14px;
    left: 2px; top: 2px; background: var(--text2);
    border-radius: 50%; transition: 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
  .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); background: #fff; }
  .toggle-label { font-size: 11px; color: var(--text2); user-select: none; }

  /* Config details */
  .config-details {
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text2); background: var(--surface);
  }
  .config-details code {
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
    font-family: "SF Mono", "Menlo", "Consolas", monospace; color: var(--text);
  }
  .config-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .config-row + .config-row { margin-top: 6px; }
  .config-label {
    font-size: 10px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.3px; min-width: 90px;
  }
  .config-value {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    color: var(--text); font-size: 12px;
  }
  .config-sep {
    width: 100%; height: 1px; background: var(--border); margin: 8px 0;
  }
  .transport-badge {
    font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 2px 6px; border-radius: 3px;
    background: var(--surface2); color: var(--text2);
  }
  .transport-badge.stdio { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .transport-badge.http { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue); }

  /* Tabs */
  .tab-bar {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: var(--surface); padding: 0 20px;
  }
  .tab-btn {
    padding: 8px 14px; font-size: 12px; color: var(--text2);
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content {
    flex: 1; overflow-y: auto; background: var(--surface);
    border-bottom: 1px solid var(--border); min-height: 0;
  }

  /* Tools panel (used inside tab) */
  .tools-panel {
    padding: 8px 20px; font-size: 12px;
  }
  .tool-item {
    padding: 6px 0; border-bottom: 1px solid var(--border);
  }
  .tool-item:last-child { border-bottom: none; }
  .tool-name {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-weight: 600; font-size: 12px; color: var(--text);
  }
  .tool-title { color: var(--text2); font-size: 11px; margin-left: 8px; }
  .tool-desc { color: var(--text2); font-size: 11px; margin-top: 2px; line-height: 1.4; }
  .tool-annotations { margin-top: 3px; }
  .annot-badge {
    display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px;
    font-weight: 500; margin-right: 4px;
  }
  .annot-badge.readonly { background: var(--green-bg); color: var(--green); }
  .annot-badge.destructive { background: var(--red-bg); color: var(--red); }
  .annot-badge.idempotent { background: var(--blue-bg); color: var(--blue); }
  .annot-badge.openworld { background: var(--yellow-bg); color: var(--yellow); }

  /* Tool search */
  .tool-search-wrap {
    position: relative; display: flex; align-items: center;
  }
  .tool-search-wrap > svg.icon:first-child {
    position: absolute; left: 8px; width: 13px; height: 13px; color: var(--text2); pointer-events: none;
  }
  .tool-search-input {
    width: 200px; padding: 5px 28px 5px 28px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 12px; font-family: inherit;
    transition: border-color 0.15s, width 0.2s;
  }
  .tool-search-input:focus { outline: none; border-color: var(--accent); width: 260px; }
  .tool-search-input::placeholder { color: var(--text2); }
  .tool-search-clear {
    position: absolute; right: 4px; background: none; border: none;
    color: var(--text2); cursor: pointer; padding: 2px; display: flex;
    align-items: center; justify-content: center; border-radius: 4px;
  }
  .tool-search-clear:hover { color: var(--text); background: var(--border); }
  .tool-search-clear .icon { width: 12px; height: 12px; }

  /* Search results */
  .search-results { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .search-results-header {
    font-size: 12px; color: var(--text2); margin-bottom: 12px;
  }
  .search-results-header strong { color: var(--text); }
  .search-group { margin-bottom: 16px; }
  .search-group-header {
    font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 4px 0; margin-bottom: 4px; cursor: pointer;
  }
  .search-group-header:hover { color: var(--accent); }
  .search-group-header .search-server-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
  }
  .search-empty {
    text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px;
  }

  /* Tab placeholder */
  .tab-placeholder {
    padding: 24px 20px; text-align: center; color: var(--text2); font-size: 12px;
  }

  /* Log viewer */
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); cursor: pointer; user-select: none;
  }
  .log-header:hover { background: var(--surface2); }
  .log-header-left { display: flex; align-items: center; gap: 6px; }
  .log-header-label {
    font-size: 10px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .log-viewer {
    overflow-y: auto; padding: 12px 20px;
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 12px; line-height: 1.6;
    background: var(--bg);
  }
  .log-viewer.expanded { flex: 1; }
  .log-viewer.collapsed { display: none; }
  .log-line { white-space: pre-wrap; word-break: break-all; color: var(--text); opacity: 0.85; }
  .content-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text2); font-size: 14px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--modal-overlay);
    z-index: 100; align-items: center; justify-content: center;
    display: flex;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw;
  }
  .modal.wide { width: 600px; }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 8px 10px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 13px; font-family: inherit;
  }
  .form-group textarea { font-family: "SF Mono", "Menlo", "Consolas", monospace; height: 60px; resize: vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .form-group input:disabled { opacity: 0.5; cursor: not-allowed; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Transport toggle */
  .transport-toggle {
    display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; margin-bottom: 12px;
  }
  .transport-toggle button {
    flex: 1; padding: 6px 16px; font-size: 12px; font-weight: 500;
    background: var(--surface2); color: var(--text2); border: none;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .transport-toggle button:not(:last-child) { border-right: 1px solid var(--border); }
  .transport-toggle button.active { background: var(--accent); color: #fff; }
  .transport-toggle button:hover:not(.active) { background: var(--border); }

  /* Confirm modal */
  .confirm-modal .modal { width: 400px; }
  .confirm-message { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }

  /* Memory badge in header */
  .mem-badge {
    font-size: 12px; padding: 6px 16px; border-radius: 16px;
    background: var(--blue-bg); color: var(--blue); font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    font-variant-numeric: tabular-nums;
    border: 1px solid var(--blue);
  }
  .mem-badge .label { font-size: 10px; opacity: 0.7; }
  .mem-badge .mem-sep { opacity: 0.4; }

  /* Server memory in content-header */
  .labeled-badge {
    font-size: 12px; padding: 2px 6px; border-radius: 12px;
    background: var(--blue-bg); color: var(--blue); font-weight: 500;
    font-variant-numeric: tabular-nums;
    display: inline-flex; align-items: center; gap: 5px;
    border: 1px solid var(--blue);
  }
  .labeled-badge .label { font-size: 10px; opacity: 0.7; }

  /* Setup panel (inline in content area) */
  .setup-panel { padding: 24px; overflow-y: auto; flex: 1; }
  .setup-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .setup-section { margin-bottom: 16px; }
  .setup-section-title {
    font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px;
  }
  .setup-code-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .setup-code {
    flex: 1; background: var(--bg); padding: 6px 10px; border-radius: var(--radius);
    font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 12px;
    color: var(--text); line-height: 1.5; white-space: pre-wrap; word-break: break-all;
  }
  .setup-note {
    font-size: 11px; color: var(--text2); padding: 10px; background: var(--bg);
    border-radius: var(--radius); line-height: 1.5;
  }

  /* Shutdown overlay */
  .shutdown-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .shutdown-overlay .shutdown-msg {
    font-size: 15px; color: var(--text2); font-weight: 500;
  }
  .shutdown-overlay .shutdown-hint {
    font-size: 12px; color: var(--text2); opacity: 0.6;
  }

  /* Home panel */
  .home-panel { padding: 1.5rem; overflow-y: auto; flex: 1; }
  .home-stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    display: flex; flex-direction: column; gap: .5rem; min-width: 100px; align-items: center;
  }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.accent { color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
  .home-section { margin-bottom: 20px; }
  .home-section-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .home-info {
    font-size: 12px; color: var(--text2); line-height: 1.6;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
  }
  .home-info code {
    background: var(--surface2); padding: 1px 5px; border-radius: 3px;
    font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 11px; color: var(--text);
  }
  .agent-tabs {

// ---------------------------------------------------------------------------
// Global Signals
// ---------------------------------------------------------------------------
const servers = signal({});
const logs = signal({});
const templates = signal([]);
const memoryData = signal(null);
const selectedId = signal(null);
const showingSetup = signal(false);

const shutdownFlag = signal(false);

// ---------------------------------------------------------------------------
// Computed Values
// ---------------------------------------------------------------------------
const selectedServer = computed(() => {
  const id = selectedId.value;
  return id ? servers.value[id] || null : null;
});

const sortedServerIds = computed(() => {
  const all = Object.keys(servers.value).sort();
  return {
    enabled: all.filter(id => !servers.value[id].disabled),
    disabled: all.filter(id => servers.value[id].disabled),
  };
});

const hasRunning = computed(() =>
  Object.values(servers.value).some(s =>
    s.status && (s.status.type === 'Running' || s.status.type === 'Initializing' || s.status.type === 'Ready' || s.status.type === 'Starting')
  )
);

const hasStartable = computed(() =>
  Object.entries(servers.value).some(([_, s]) =>
    !s.disabled && (!s.status || s.status.type === 'Stopped' || s.status.type === 'Error')
  )
);

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function formatBytes(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

function statusClass(status) {
  if (!status) return 'stopped';
  return status.type.toLowerCase();
}

function statusLabel(status) {
  if (!status) return 'Unknown';
  switch (status.type) {
    case 'Stopped': return 'Stopped';
    case 'Starting': return 'Starting';
    case 'Running': return 'Running';
    case 'Initializing': return 'Initializing';
    case 'Ready': return 'Ready';
    case 'Stopping': return 'Stopping';
    case 'Error': return 'Error';
    default: return status.type;
  }
}

function statusPid(status) {
  if (!status) return null;
  switch (status.type) {
    case 'Running': return { label: 'PID', value: String(status.pid) };
    case 'Initializing': return status.pid ? { label: 'PID', value: String(status.pid) } : null;
    case 'Ready': return status.pid ? { label: 'PID', value: String(status.pid) } : { label: null, value: 'Remote' };
    default: return null;
  }
}

function isRunning(status) {
  return status && (status.type === 'Running' || status.type === 'Initializing' || status.type === 'Ready');
}

function statusDotColor(status) {
  if (!status) return 'var(--text2)';
  switch (status.type) {
    case 'Starting': case 'Stopping': case 'Initializing': return 'var(--yellow)';
    case 'Running': case 'Ready': return 'var(--green)';
    case 'Error': return 'var(--red)';
    default: return 'var(--text2)';
  }
}

function mcpUrl() { return window.location.origin + '/mcp'; }

function getServerMem(id) {
  const md = memoryData.value;
  if (!md || !md.servers || !md.servers[id]) return null;
  return md.servers[id].mem;
}

// ---------------------------------------------------------------------------
// API Functions
// ---------------------------------------------------------------------------
async function fetchServers() {
  try {
    const res = await fetch('/api/servers');
    servers.value = await res.json();
  } catch (e) { console.error('Failed to load servers', e); }
}

async function fetchTemplates() {
  try {
    const res = await fetch('/api/templates');
    templates.value = await res.json();
  } catch (e) { console.error('Failed to load templates', e); }
}

async function pollMemory() {
  try {
    const res = await fetch('/api/memory');
    memoryData.value = await res.json();
  } catch (e) { /* ignore */ }
}

async function apiStartServer(id) {
  await fetch('/api/servers/' + encodeURIComponent(id) + '/start', { method: 'POST' });
}

async function apiStopServer(id) {
  await fetch('/api/servers/' + encodeURIComponent(id) + '/stop', { method: 'POST' });
}

async function apiAddServer(id, config) {
  await fetch('/api/servers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, config }),
  });
  setTimeout(fetchServers, 200);
}

async function apiUpdateServer(id, config) {
  await fetch('/api/servers/' + encodeURIComponent(id), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ config }),
  });
  setTimeout(fetchServers, 200);
}

async function apiDeleteServer(id) {
  await fetch('/api/servers/' + encodeURIComponent(id), { method: 'DELETE' });
  batch(() => {
    const s = { ...servers.value };
    delete s[id];
    servers.value = s;
    const l = { ...logs.value };
    delete l[id];
    logs.value = l;
    const m = { ...mcpLogMessages.value };
    delete m[id];
    mcpLogMessages.value = m;
    if (selectedId.value === id) selectedId.value = null;
  });
}

async function apiToggleDisabled(id, disabled) {
  await fetch('/api/servers/' + encodeURIComponent(id) + '/disabled', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ disabled }),
  });
  if (servers.value[id]) {
    servers.value = { ...servers.value, [id]: { ...servers.value[id], disabled } };
  }
}

async function apiStartAll() {
  await fetch('/api/servers/start-all', { method: 'POST' });
}

async function apiStopAll() {
  await fetch('/api/servers/stop-all', { method: 'POST' });
}

function apiRequestLogs(id) {
  fetch('/api/servers/' + encodeURIComponent(id) + '/logs', { method: 'GET' });
}

async function apiClearLogs(id) {
  logs.value = { ...logs.value, [id]: [] };
  await fetch('/api/servers/' + encodeURIComponent(id) + '/logs', { method: 'DELETE' });
}

async function apiRestartAll() {
  const runningIds = Object.entries(servers.value)
    .filter(([_, s]) => isRunning(s.status))
    .map(([id]) => id);
  await fetch('/api/servers/stop-all', { method: 'POST' });
  setTimeout(() => {
    runningIds.forEach(id => {
      fetch('/api/servers/' + encodeURIComponent(id) + '/start', { method: 'POST' });
    });
  }, 2000);
}

async function apiSetLogLevel(id, level) {
  await fetch('/api/servers/' + encodeURIComponent(id) + '/log-level', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ level }),
  });
}

// ---------------------------------------------------------------------------
// SSE Connection
// ---------------------------------------------------------------------------
function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    handleSSEvent(evt);
  };
  es.onerror = () => {
    console.warn('SSE disconnected, reconnecting...');
  };
  return es;
}

function handleSSEvent(evt) {
  switch (evt.type) {
    case 'ServerStatusChanged': {
      const cur = servers.value;
      if (cur[evt.id]) {
        const updated = { ...cur[evt.id], status: evt.status };
        if (evt.status.type === 'Stopped') {
          updated.tools = [];
          updated.resources = [];
          updated.resource_templates = [];
          updated.prompts = [];
          updated.peer_info = null;
          updated.logging = null;
          logs.value = { ...logs.value, [evt.id]: [] };
          const curMsgs = { ...mcpLogMessages.value };
          delete curMsgs[evt.id];
          mcpLogMessages.value = curMsgs;
        }
        servers.value = { ...cur, [evt.id]: updated };
        if (evt.status.type === 'Error' && selectedId.value === evt.id) {
          logExpanded.value = true;
        }
      } else {
        fetchServers();
      }
      break;
    }
    case 'McpToolsChanged': {
      const cur = servers.value;
      if (cur[evt.id]) {
        servers.value = { ...cur, [evt.id]: { ...cur[evt.id], tools: evt.tools || [] } };
      }
      break;
    }
    case 'McpResourcesChanged': {
      const cur = servers.value;
      if (cur[evt.id]) {
        servers.value = { ...cur, [evt.id]: { ...cur[evt.id], resources: evt.resources || [], resource_templates: evt.resource_templates || [] } };
      }
      break;
    }
    case 'McpPromptsChanged': {
      const cur = servers.value;
      if (cur[evt.id]) {
        servers.value = { ...cur, [evt.id]: { ...cur[evt.id], prompts: evt.prompts || [] } };
      }
      break;
    }
    case 'McpLoggingMessage': {
      const curMsgs = { ...mcpLogMessages.value };
      let arr = [...(curMsgs[evt.id] || []), evt.message];
      if (arr.length > 200) arr = arr.slice(-200);
      curMsgs[evt.id] = arr;
      mcpLogMessages.value = curMsgs;
      break;
    }
    case 'McpLoggingLevelChanged': {
      const cur = servers.value;
      if (cur[evt.id]) {
        servers.value = { ...cur, [evt.id]: { ...cur[evt.id], logging: { current_level: evt.level } } };
      }
      break;
    }
    case 'McpServerReady':
      fetchServers();
      break;
    case 'LogLine': {
      const curLogs = { ...logs.value };
      let arr = [...(curLogs[evt.id] || []), evt.line];
      if (arr.length > 200) arr = arr.slice(-200);
      curLogs[evt.id] = arr;
      logs.value = curLogs;
      break;
    }
    case 'LogSnapshot':
      logs.value = { ...logs.value, [evt.id]: evt.lines || [] };
      break;
    case 'ConfigLoaded':
      fetchServers();
      break;
    case 'Error':
      console.error('Backend error:', evt.message);
      break;
    case 'Shutdown':
      window.close();
      shutdownFlag.value = true;
      break;
  }
}

function StatusDot({ status }) {
  return html`<span class="status-dot ${statusClass(status)}"></span>`;
}

function StatusBadge({ status }) {
  return html`<span class="status-badge ${statusClass(status)}">${statusLabel(status)}</span>`;
}

function TransportBadge({ server }) {
  if (server.config.command) {
    return html`<span class="transport-badge stdio">STDIO</span>`;
  }
  if (server.config.url) {
    return html`<span class="transport-badge http">HTTP</span>`;
  }
  return null;
}

function AnnotationBadge({ type }) {
  const map = {
    'read-only': 'readonly',
    'destructive': 'destructive',
    'idempotent': 'idempotent',
    'open-world': 'openworld',
  };
  return html`<span class="annot-badge ${map[type] || ''}">${type}</span>`;
}

function ToggleSwitch({ checked, onChange, title, label }) {
  return html`<label class="toggle-switch" title=${title}>
    <input type="checkbox" checked=${checked} onChange=${onChange} />
    <span class="toggle-slider"></span>
    <span class="toggle-label">${label}</span>
  </label>`;
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = useCallback((e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  }, [text]);
  return html`<button class="btn" style="padding:4px 10px;font-size:11px;flex-shrink:0" onClick=${handleCopy}>
    ${copied ? 'Copied!' : 'Copy'}
  </button>`;
}

function Tooltip({ text, children, position }) {
  const [show, setShow] = useState(false);
  const [style, setStyle] = useState({});
  const wrapRef = useRef(null);
  const pos = position || 'bottom';
  const handleEnter = useCallback(() => {
    if (!wrapRef.current) return;
    const rect = wrapRef.current.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    setStyle(pos === 'top'
      ? { top: (rect.top - 8) + 'px', left: cx + 'px' }
      : { top: (rect.bottom + 8) + 'px', left: cx + 'px' });
    setShow(true);
  }, [pos]);
  const handleLeave = useCallback(() => setShow(false), []);
  if (!text) return children;
  return html`<span class="tooltip-wrap" ref=${wrapRef}
    onMouseEnter=${handleEnter} onMouseLeave=${handleLeave}>
    ${children}
    ${show && html`<span class="tooltip-text" data-tip=${pos} style=${style}>${text}</span>`}
  </span>`;
}

function MemBadge() {
  const md = memoryData.value;
  if (!md) return null;
  return html`<span class="mem-badge" title="RAM usage">
    <span class="label">App</span><span>${formatBytes(md.self.mem || 0)}</span>
    <span class="mem-sep">|</span>
    <span class="label">Servers</span><span>${formatBytes(md.servers_total || 0)}</span>
  </span>`;
}

function ServerMemBadge({ id }) {
  const s = servers.value[id];
  if (!s || !isRunning(s.status)) return null;
  const mem = getServerMem(id);
  if (mem == null) return null;
  return html`<span class="labeled-badge">
    <span class="label">RAM</span>${formatBytes(mem)}
  </span>`;
}

function PidBadge({ status }) {
  const info = statusPid(status);
  if (!info) return null;

function ThemeToggle() {
  const [theme, setTheme] = useState(document.documentElement.getAttribute('data-theme') || 'dark');
  const toggle = useCallback(() => {
    const next = theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mcpsm-theme', next);
    setTheme(next);
  }, [theme]);
  return html`<${Tooltip} text=${theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'}>
    <button class="icon-btn" onClick=${toggle}>
      ${theme === 'dark' ? html`<${IconSun} />` : html`<${IconMoon} />`}
    </button>
  <//>`;
}

const LOG_LEVELS = ['debug', 'info', 'notice', 'warning', 'error', 'critical', 'alert', 'emergency'];
const LOG_LEVEL_COLORS = {
  debug: 'var(--text2)', info: 'var(--blue)', notice: 'var(--blue)',
  warning: 'var(--yellow)', error: 'var(--red)', critical: 'var(--red)',
  alert: 'var(--red)', emergency: 'var(--red)',
};

function LoggingPanel({ id, server }) {
  const logging = server.logging || {};
  const currentLevel = logging.current_level || 'warning';
  const viewerRef = useRef(null);
  const [autoScroll, setAutoScroll] = useState(true);

  // Filter MCP log messages from the log stream
  const allLines = logs.value[id] || [];
  const mcpLines = useMemo(() => allLines.filter(l => l.includes('[mcp]')), [allLines]);

  useEffect(() => {
    if (autoScroll && viewerRef.current) {
      viewerRef.current.scrollTop = viewerRef.current.scrollHeight;
    }
  }, [autoScroll, mcpLines.length]);

  const handleLevelChange = useCallback(async (level) => {
    await apiSetLogLevel(id, level);
    // Optimistically update; backend will confirm via SSE
    if (servers.value[id]) {
      const cur = servers.value[id];
      servers.value = { ...servers.value, [id]: { ...cur, logging: { ...cur.logging, current_level: level } } };
    }
  }, [id]);

  return html`<div style="display:flex;flex-direction:column;height:100%">
    <div style="padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Log Level</span>
      <div style="display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        ${LOG_LEVELS.map(level => html`
          <button key=${level} onClick=${() => handleLevelChange(level)}
            style="padding:3px 8px;font-size:10px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all 0.15s;
              background:${level === currentLevel ? 'var(--accent)' : 'var(--surface2)'};
              color:${level === currentLevel ? '#fff' : 'var(--text2)'};
              ${level !== LOG_LEVELS[LOG_LEVELS.length - 1] ? 'border-right:1px solid var(--border);' : ''}"
          >${level}</button>
        `)}
      </div>
      <label style="display:flex;align-items:center;gap:4px;margin-left:auto;font-size:11px;color:var(--text2);cursor:pointer;user-select:none">
        <input type="checkbox" checked=${autoScroll} onChange=${(e) => setAutoScroll(e.target.checked)} style="margin:0" />
        Auto-scroll
      </label>
    </div>
    <div ref=${viewerRef} style="flex:1;overflow-y:auto;padding:8px 20px;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:12px;line-height:1.6;background:var(--bg)">
      ${mcpLines.length === 0
        ? html`<div style="text-align:center;padding:24px;color:var(--text2);font-family:inherit;font-size:12px">No MCP log messages yet</div>`
        : mcpLines.map((l, i) => html`<div key=${i} style="white-space:pre-wrap;word-break:break-all;color:var(--text);opacity:0.85">${l}</div>`)
      }
    </div>
  </div>`;
}

function TabBar({ server }) {
  const caps = server.peer_info ? server.peer_info.capabilities : null;
  const tools = server.tools || [];
  const resources = server.resources || [];
  const resourceTemplates = server.resource_templates || [];
  const resourceCount = resources.length + resourceTemplates.length;
  const tabs = [{ key: 'tools', label: 'Tools (' + tools.length + ')' }];
  if (caps && caps.resources) tabs.push({ key: 'resources', label: 'Resources' + (resourceCount > 0 ? ' (' + resourceCount + ')' : '') });
  const prompts = server.prompts || [];
  if (caps && caps.prompts) tabs.push({ key: 'prompts', label: 'Prompts' + (prompts.length > 0 ? ' (' + prompts.length + ')' : '') });
  if (caps && caps.logging) tabs.push({ key: 'logging', label: 'Logging' });

  const current = activeTab.value;
  if (!tabs.find(t => t.key === current)) activeTab.value = 'tools';

  return html`<div class="tab-bar">
    ${tabs.map(t => html`
      <button key=${t.key} class="tab-btn${t.key === activeTab.value ? ' active' : ''}"
              onClick=${() => activeTab.value = t.key}>${t.label}</button>
    `)}
  </div>`;
}

function TabContent({ server }) {
  const tab = activeTab.value;
  const id = selectedId.value;
  if (tab === 'tools') {
    return html`<div class="tab-content"><${ToolsPanel} tools=${server.tools || []} /></div>`;
  }
  if (tab === 'resources') {
    return html`<div class="tab-content"><${ResourcesPanel} resources=${server.resources || []} resourceTemplates=${server.resource_templates || []} /></div>`;
  }
  if (tab === 'prompts') {
    return html`<div class="tab-content"><${PromptsPanel} prompts=${server.prompts || []} /></div>`;
  }
  if (tab === 'logging') {
    return html`<div class="tab-content"><${LoggingPanel} id=${id} server=${server} /></div>`;
  }
  return html`<div class="tab-content"><div class="tab-placeholder">Not yet implemented</div></div>`;
}

          </svg>

    <div class="log-viewer ${expanded ? 'expanded' : 'collapsed'}" ref=${viewerRef}>

      <p style="font-size:11px;color:var(--text2);margin-bottom:10px">
        Copy the configuration for your MCP client. All clients connect to the single proxy endpoint — tools from all running servers are aggregated automatically.
      </p>
      <${AgentConfigTabs} />
    </div>
  </div>`;
}

// ---------------------------------------------------------------------------
// Content Router
// ---------------------------------------------------------------------------
function SearchResults() {
  const q = toolSearch.value.toLowerCase().trim();
  const srvs = servers.value;
  const results = [];
  for (const [id, srv] of Object.entries(srvs)) {
    const matchedTools = (srv.tools || []).filter(t => {
      if (typeof t === 'string') return t.toLowerCase().includes(q);
      return (t.name && t.name.toLowerCase().includes(q))
        || (t.title && t.title.toLowerCase().includes(q))
        || (t.description && t.description.toLowerCase().includes(q));
    });
    const matchedResources = (srv.resources || []).filter(r =>
      (r.name && r.name.toLowerCase().includes(q))
      || (r.title && r.title.toLowerCase().includes(q))
      || (r.description && r.description.toLowerCase().includes(q))
      || (r.uri && r.uri.toLowerCase().includes(q))
    );
    const matchedTemplates = (srv.resource_templates || []).filter(t =>
      (t.name && t.name.toLowerCase().includes(q))
      || (t.title && t.title.toLowerCase().includes(q))
      || (t.description && t.description.toLowerCase().includes(q))
      || (t.uri_template && t.uri_template.toLowerCase().includes(q))
    );
    const matchedPrompts = (srv.prompts || []).filter(p =>
      (p.name && p.name.toLowerCase().includes(q))
      || (p.title && p.title.toLowerCase().includes(q))
      || (p.description && p.description.toLowerCase().includes(q))
    );
    const totalMatched = matchedTools.length + matchedResources.length + matchedTemplates.length + matchedPrompts.length;
    const serverMatch = id.toLowerCase().includes(q);
    if (totalMatched > 0 || serverMatch) {
      results.push({
        id, server: srv,
        tools: serverMatch && matchedTools.length === 0 ? (srv.tools || []) : matchedTools,
        resources: serverMatch && matchedResources.length === 0 ? (srv.resources || []) : matchedResources,
        resourceTemplates: serverMatch && matchedTemplates.length === 0 ? (srv.resource_templates || []) : matchedTemplates,
        prompts: serverMatch && matchedPrompts.length === 0 ? (srv.prompts || []) : matchedPrompts,
      });
    }
  }
  const totalTools = results.reduce((sum, r) => sum + r.tools.length, 0);
  const totalResources = results.reduce((sum, r) => sum + r.resources.length + r.resourceTemplates.length, 0);
  const totalPrompts = results.reduce((sum, r) => sum + r.prompts.length, 0);
  const totalMatches = totalTools + totalResources + totalPrompts;

  const goToServer = useCallback((serverId, tab) => {
    batch(() => {
      selectedId.value = serverId;
      activeTab.value = tab || 'tools';
      toolSearch.value = '';
    });
    apiRequestLogs(serverId);
  }, []);

  if (totalMatches === 0) {
    return html`<div class="content">
      <div class="search-empty">
        <div style="font-size:20px;margin-bottom:8px">No results found</div>
        <div>No matches for "<strong>${toolSearch.value}</strong>" across any server</div>
      </div>
    </div>`;
  }

  return html`<div class="content">
    <div class="search-results">
      <div class="search-results-header">
        <strong>${totalMatches}</strong> result${totalMatches !== 1 ? 's' : ''} matching "<strong>${toolSearch.value}</strong>" across <strong>${results.length}</strong> server${results.length !== 1 ? 's' : ''}
        ${totalTools > 0 && html` · <span style="color:var(--accent)">${totalTools} tool${totalTools !== 1 ? 's' : ''}</span>`}
        ${totalResources > 0 && html` · <span style="color:var(--green)">${totalResources} resource${totalResources !== 1 ? 's' : ''}</span>`}
        ${totalPrompts > 0 && html` · <span style="color:var(--yellow)">${totalPrompts} prompt${totalPrompts !== 1 ? 's' : ''}</span>`}
      </div>
      ${results.map(r => {
        const bestTab = r.tools.length > 0 ? 'tools' : r.resources.length > 0 ? 'resources' : 'prompts';
        const count = r.tools.length + r.resources.length + r.resourceTemplates.length + r.prompts.length;
        return html`
          <div class="search-group" key=${r.id}>
            <div class="search-group-header" onClick=${() => goToServer(r.id, bestTab)}>
              <span class="search-server-dot" style="background:${statusDotColor(r.server.status)}"></span>
              ${r.id} (${count})
            </div>
            ${r.tools.length > 0 && html`<div class="tools-panel">
              ${r.tools.map(t => html`<${ToolItem} key=${typeof t === 'string' ? t : t.name} tool=${t} />`)}
            </div>`}
            ${r.resources.length > 0 && html`<div class="tools-panel">
              ${r.resources.map(res => html`<${ResourceItem} key=${res.uri} resource=${res} />`)}
            </div>`}
            ${r.resourceTemplates.length > 0 && html`<div class="tools-panel">
              ${r.resourceTemplates.map(t => html`<${ResourceTemplateItem} key=${t.uri_template} template=${t} />`)}
            </div>`}
            ${r.prompts.length > 0 && html`<div class="tools-panel">
              ${r.prompts.map(p => html`<${PromptItem} key=${p.name} prompt=${p} />`)}
            </div>`}
          </div>
        `;
      })}
    </div>
  </div>`;
}

function Content() {
  if (toolSearch.value.trim()) {
    return html`<${SearchResults} />`;
  }
  const id = selectedId.value;
  const s = id ? servers.value[id] : null;
  if (!id || !s) {
    return html`<div class="content"><${HomePanel} /></div>`;
  }
  return html`<div class="content"><${ServerDetail} id=${id} server=${s} /></div>`;
}

// ---------------------------------------------------------------------------
// Modals
// ---------------------------------------------------------------------------
function ServerModal() {
  const m = modalState.value;
  const isEdit = m.type === 'edit';
  const editId = isEdit ? m.data.serverId : null;
  const editServer = isEdit && editId ? servers.value[editId] : null;

  const [transport, setTransport] = useState(() => {
    if (isEdit && editServer && editServer.config.url) return 'http';
    return 'stdio';
  });
  const [serverId, setServerId] = useState(() => isEdit ? editId : '');
  const [command, setCommand] = useState(() => isEdit && editServer ? (editServer.config.command || '') : '');
  const [args, setArgs] = useState(() => isEdit && editServer ? (editServer.config.args || []).join('\n') : '');
  const [env, setEnv] = useState(() => {
    if (isEdit && editServer) {
      return Object.entries(editServer.config.env || {}).map(([k,v]) => k + '=' + v).join('\n');
    }
    return '';
  });
  const [url, setUrl] = useState(() => isEdit && editServer ? (editServer.config.url || '') : '');
  const [authHeader, setAuthHeader] = useState(() => isEdit && editServer ? (editServer.config.auth_header || '') : '');
  const [templateVal, setTemplateVal] = useState('');
  const [errors, setErrors] = useState({});
  const clearError = useCallback((field) => {
    setErrors(prev => {
      if (!prev[field]) return prev;
      const next = { ...prev };
      delete next[field];
      return next;
    });
  }, []);

  const close = useCallback(() => { modalState.value = { type: null, data: null }; }, []);

  const applyTemplate = useCallback((name) => {
    setTemplateVal(name);
    const t = templates.value.find(x => x.name === name);
    if (!t) return;
    setServerId(name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9_-]/g, ''));
    setTransport('stdio');
    setCommand(t.config.command || '');
    setArgs((t.config.args || []).join('\n'));
    setEnv(Object.entries(t.config.env || {}).map(([k,v]) => k + '=' + v).join('\n'));
  }, []);

  const submit = useCallback(async () => {
    const errs = {};
    const id = serverId.trim();
    if (!id) errs.serverId = 'Server ID is required';
    else if (!/^[a-zA-Z0-9_-]+$/.test(id)) errs.serverId = 'Only letters, numbers, dashes and underscores';

    let config;
    if (transport === 'stdio') {
      const cmd = command.trim();
      if (!cmd) errs.command = 'Command is required';
      if (Object.keys(errs).length > 0) { setErrors(errs); return; }
      const argList = args.split('\n').map(s => s.trim()).filter(Boolean);
      const envMap = {};
      env.split('\n').map(s => s.trim()).filter(Boolean).forEach(line => {
        const eq = line.indexOf('=');
        if (eq > 0) envMap[line.slice(0, eq).trim()] = line.slice(eq + 1).trim();
      });
      config = { command: cmd, args: argList, env: envMap };
    } else {
      const u = url.trim();
      if (!u) errs.url = 'URL is required';
      try { new URL(u); } catch (e) { errs.url = 'Invalid URL'; }
      if (Object.keys(errs).length > 0) { setErrors(errs); return; }
      config = { url: u };
      const ah = authHeader.trim();
      if (ah) config.auth_header = ah;
    }

    setErrors({});
    if (isEdit) {
      await apiUpdateServer(editId, config);
    } else {
      await apiAddServer(id, config);
    }
    close();
  }, [serverId, transport, command, args, env, url, authHeader, isEdit, editId, close]);

  return html`<div class="modal-overlay" onClick=${(e) => { if (e.target === e.currentTarget) close(); }}>
    <div class="modal wide">
      <h3>${isEdit ? 'Edit Server' : 'Add Server'}</h3>
      ${!isEdit && html`
        <div class="form-group">
          <label>Template (optional)</label>
          <select value=${templateVal} onChange=${(e) => applyTemplate(e.target.value)}>
            <option value="">Custom...</option>
            ${templates.value.map(t => html`<option key=${t.name} value=${t.name}>${t.name} — ${t.description}</option>`)}
          </select>
        </div>
      `}
      <div class="form-group">
        <label>Server ID</label>
        <input type="text" value=${serverId} onInput=${(e) => { setServerId(e.target.value); clearError('serverId'); }}
               placeholder="my-server" class=${errors.serverId ? 'has-error' : ''}
               disabled=${isEdit} />
        ${errors.serverId && html`<div class="form-error">${errors.serverId}</div>`}
      </div>
      <div class="transport-toggle">
        <button class=${transport === 'stdio' ? 'active' : ''} onClick=${() => { setTransport('stdio'); setErrors({}); }}>STDIO</button>
        <button class=${transport === 'http' ? 'active' : ''} onClick=${() => { setTransport('http'); setErrors({}); }}>HTTP</button>
      </div>
      ${transport === 'stdio' ? html`
        <div>
          <div class="form-group">
            <label>Command</label>
            <input type="text" value=${command} onInput=${(e) => { setCommand(e.target.value); clearError('command'); }}
                   placeholder="npx" class=${errors.command ? 'has-error' : ''} />
            ${errors.command && html`<div class="form-error">${errors.command}</div>`}
          </div>
          <div class="form-group">
            <label>Arguments (one per line)</label>
            <textarea value=${args} onInput=${(e) => setArgs(e.target.value)} placeholder=${'-y\n@example/server'}></textarea>
          </div>
          <div class="form-group">
            <label>Environment (KEY=VALUE, one per line)</label>
            <textarea value=${env} onInput=${(e) => setEnv(e.target.value)} placeholder="FOO=bar"></textarea>
          </div>
        </div>
      ` : html`
        <div>
          <div class="form-group">
            <label>URL</label>
            <input type="url" value=${url} onInput=${(e) => { setUrl(e.target.value); clearError('url'); }}
                   placeholder="http://localhost:8080/mcp" class=${errors.url ? 'has-error' : ''} />
            ${errors.url && html`<div class="form-error">${errors.url}</div>`}
          </div>
          <div class="form-group">
            <label>Authorization Header (Bearer token, optional)</label>
            <input type="text" value=${authHeader} onInput=${(e) => setAuthHeader(e.target.value)} placeholder="your-token-here" />
          </div>
        </div>
      `}
      <div class="modal-actions">
        <button class="btn" onClick=${close}>Cancel</button>
        <button class="btn btn-accent" onClick=${submit}>${isEdit ? 'Save' : 'Add'}</button>
      </div>
    </div>
  </div>`;
}

function ConfirmModal() {
  const m = modalState.value;
  const id = m.data ? m.data.serverId : '';
  const close = useCallback(() => { modalState.value = { type: null, data: null }; }, []);
  const doDelete = useCallback(async () => {
    close();
    await apiDeleteServer(id);
  }, [id, close]);
  return html`<div class="modal-overlay confirm-modal" onClick=${(e) => { if (e.target === e.currentTarget) close(); }}>
    <div class="modal">
      <h3>Confirm Delete</h3>
      <div class="confirm-message">Are you sure you want to delete server "${id}"? This action cannot be undone.</div>
      <div class="modal-actions">
        <button class="btn" onClick=${close}>Cancel</button>
        <button class="btn btn-danger" onClick=${doDelete}>Delete</button>
      </div>
    </div>
  </div>`;
}

// ---------------------------------------------------------------------------
// Shutdown Overlay
// ---------------------------------------------------------------------------
function ShutdownOverlay() {
  if (!shutdownFlag.value) return null;
  return html`<div class="shutdown-overlay">
    <div class="shutdown-msg">MCPSM has shut down</div>
    <div class="shutdown-hint">You can close this tab</div>
  </div>`;
}

// ---------------------------------------------------------------------------
// App Root
// ---------------------------------------------------------------------------
function App() {
  useEffect(() => {
    fetchServers();
    fetchTemplates();
    pollMemory();
    const memInterval = setInterval(pollMemory, 5000);
    const es = connectSSE();
    return () => {
      clearInterval(memInterval);
      es.close();
    };
  }, []);

  const m = modalState.value;

  return html`
    <${Header} />
    <div class="main">
      <${Sidebar} />
      <${Content} />
    </div>
    ${m.type === 'add' && html`<${ServerModal} key="add-new" />`}
    ${m.type === 'edit' && html`<${ServerModal} key=${'edit-' + (m.data && m.data.serverId)} />`}
    ${m.type === 'confirmDelete' && html`<${ConfirmModal} key=${'del-' + (m.data && m.data.serverId)} />`}
    <${ShutdownOverlay} />
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
