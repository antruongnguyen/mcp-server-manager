name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: mcpsm-macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            output_name: mcpsm-macos-aarch64
          - artifact_name: mcpsm-linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output_name: mcpsm-linux-x86_64
          - artifact_name: mcpsm-linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            output_name: mcpsm-linux-aarch64
          - artifact_name: mcpsm-windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            output_name: mcpsm-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build mcpsm-cli (release)
        run: cargo build --release -p mcpsm-cli --target ${{ matrix.target }}

      - name: Package CLI binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/mcpsm ${{ matrix.output_name }}

      - name: Package CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -Path "target/${{ matrix.target }}/release/mcpsm.exe" -Destination "${{ matrix.output_name }}"

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_name }}
          if-no-files-found: error

  build-macos-app:
    name: Build macOS app bundle
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build MCPSM.app
        run: ./scripts/build-app.sh

      - name: Archive MCPSM.app
        run: ditto -c -k --sequesterRsrc --keepParent target/release/MCPSM.app MCPSM.app.zip

      - name: Upload macOS app archive
        uses: actions/upload-artifact@v7
        with:
          name: mcpsm-macos-arm64-app
          path: MCPSM.app.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-cli, build-macos-app]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s globstar nullglob
          for file in release-artifacts/**/*; do
            if [ -f "$file" ]; then
              cp "$file" "release-assets/$(basename "$file")"
            fi
          done

      - name: Generate checksums and release notes
        run: |
          set -euo pipefail
          : > SHA256SUMS.txt
          for file in release-assets/*; do
            shasum -a 256 "$file" >> SHA256SUMS.txt
          done
          {
            echo "## Release Assets"
            echo
            echo "Built from tag \\`${GITHUB_REF_NAME}\\`."
            echo
            echo "## Checksums (SHA256)"
            echo
            echo '```text'
            cat SHA256SUMS.txt
            echo '```'
          } > RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/*
            SHA256SUMS.txt
