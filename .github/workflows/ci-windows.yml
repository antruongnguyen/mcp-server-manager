name: CI Windows

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Windows x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x86_64-cargo-

      - name: Build mcpsm-cli (release)
        run: cargo build --release -p mcpsm-cli --target x86_64-pc-windows-msvc

      - name: Run tests
        run: cargo test -p mcpsm-core -p mcpsm-cli --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcpsm-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/mcpsm.exe
          if-no-files-found: error
