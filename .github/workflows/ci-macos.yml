name: CI macOS

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: macOS aarch64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            aarch64-macos-cargo-

      - name: Build mcpsm-cli (release)
        run: cargo build --release -p mcpsm-cli --target aarch64-apple-darwin

      - name: Build mcpsm-gui (release)
        run: cargo build --release -p mcpsm-gui --target aarch64-apple-darwin

      - name: Run tests
        run: cargo test -p mcpsm-core -p mcpsm-cli --target aarch64-apple-darwin

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcpsm-macos-aarch64
          path: target/aarch64-apple-darwin/release/mcpsm
          if-no-files-found: error

  build-app:
    name: macOS app bundle (aarch64)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-macos-app-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            aarch64-macos-app-cargo-

      - name: Build MCPSM.app
        run: ./scripts/build-app.sh

      - name: Archive MCPSM.app
        run: ditto -c -k --sequesterRsrc --keepParent target/release/MCPSM.app MCPSM.app.zip

      - name: Upload macOS app archive
        uses: actions/upload-artifact@v7
        with:
          name: mcpsm-macos-arm64-app
          path: MCPSM.app.zip
          if-no-files-found: error
