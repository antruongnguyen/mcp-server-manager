name: CI Linux

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mcpsm-linux-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: mcpsm-linux-aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.arch }}-cargo-

      - name: Build mcpsm-cli (release)
        run: cargo build --release -p mcpsm-cli --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test -p mcpsm-core -p mcpsm-cli --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/mcpsm
          if-no-files-found: error
